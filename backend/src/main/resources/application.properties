spring.application.name=dino-transit-backend
spring.docker.compose.enabled=false
server.port=${PORT:8080}
# Default simulator only — set TRANSIT_MODE=metrolisboa (and TRANSIT_METROLISBOA_ENABLED=true) for live API.
transit.mode=${TRANSIT_MODE:simulator}
transit.broadcast-fixed-rate-ms=${TRANSIT_BROADCAST_FIXED_RATE_MS:500}
transit.gtfs.enabled=${TRANSIT_GTFS_ENABLED:true}
transit.gtfs.static-path=${TRANSIT_GTFS_STATIC_PATH:}
transit.gtfs.vehicle-positions-url=${TRANSIT_GTFS_VEHICLE_POSITIONS_URL:}
transit.gtfs.trip-updates-url=${TRANSIT_GTFS_TRIP_UPDATES_URL:}
transit.gtfs.connect-timeout-ms=${TRANSIT_GTFS_CONNECT_TIMEOUT_MS:3000}
transit.gtfs.read-timeout-ms=${TRANSIT_GTFS_READ_TIMEOUT_MS:3000}
transit.metro-lisboa.enabled=${TRANSIT_METROLISBOA_ENABLED:false}
transit.metro-lisboa.base-url=${METROLISBOA_BASE_URL:https://api.metrolisboa.pt:8243/estadoServicoML/1.0.1}
transit.metro-lisboa.token-url=${METROLISBOA_TOKEN_URL:}
transit.metro-lisboa.access-token=${METROLISBOA_ACCESS_TOKEN:}
transit.metro-lisboa.client-id=${METROLISBOA_CLIENT_ID:}
transit.metro-lisboa.client-secret=${METROLISBOA_CLIENT_SECRET:}
transit.metro-lisboa.timeout-ms=${METROLISBOA_TIMEOUT_MS:4000}
transit.metro-lisboa.max-vehicles-per-line=${METROLISBOA_MAX_VEHICLES_PER_LINE:6}
transit.metro-lisboa.insecure-ssl=${METROLISBOA_INSECURE_SSL:false}
transit.fallback.schedule-enabled=${TRANSIT_FALLBACK_SCHEDULE_ENABLED:true}
transit.fallback.simulator-enabled=${TRANSIT_FALLBACK_SIMULATOR_ENABLED:true}
transit.fallback.publish-last-known-good=${TRANSIT_FALLBACK_PUBLISH_LAST_KNOWN_GOOD:true}
