services:
  backend:
    build: ./backend
    ports:
      - "8181:8181"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - PORT=8181
      - TRANSIT_MODE=${TRANSIT_MODE:-simulator}
      - TRANSIT_METROLISBOA_ENABLED=${TRANSIT_METROLISBOA_ENABLED:-false}
      - TRANSIT_GTFS_ENABLED=true
      - TRANSIT_GTFS_STATIC_PATH=${TRANSIT_GTFS_STATIC_PATH}
      - TRANSIT_GTFS_VEHICLE_POSITIONS_URL=${TRANSIT_GTFS_VEHICLE_POSITIONS_URL:-}
      - TRANSIT_GTFS_TRIP_UPDATES_URL=${TRANSIT_GTFS_TRIP_UPDATES_URL:-}
      - METROLISBOA_BASE_URL=${METROLISBOA_BASE_URL:-}
      - METROLISBOA_TOKEN_URL=${METROLISBOA_TOKEN_URL:-}
      - METROLISBOA_ACCESS_TOKEN=${METROLISBOA_ACCESS_TOKEN:-}
      - METROLISBOA_CLIENT_ID=${METROLISBOA_CLIENT_ID:-}
      - METROLISBOA_CLIENT_SECRET=${METROLISBOA_CLIENT_SECRET:-}
      - METROLISBOA_INSECURE_SSL=${METROLISBOA_INSECURE_SSL:-false}

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_WS_URL=ws://localhost:8181/ws
    ports:
      - "5500:80"
    depends_on:
      - backend